name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -e .

      - name: Lint
        run: ruff check agentmesh tests benchmarks

      - name: Test
        env:
          ANTHROPIC_API_KEY: dummy-not-used-by-tests
          AGENTMESH_LOG_LEVEL: WARNING
        run: pytest -v --cov=agentmesh --cov-report=term

      - name: Verify install
        env:
          ANTHROPIC_API_KEY: dummy-not-used-by-this-script
        run: python scripts/verify_install.py
