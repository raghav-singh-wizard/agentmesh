services:
  redis:
    image: redis:7-alpine
    container_name: agentmesh-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  agentmesh:
    build: .
    container_name: agentmesh-api
    depends_on:
      redis:
        condition: service_healthy
    environment:
      - REDIS_URL=redis://redis:6379/0
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - AGENTMESH_HOST=0.0.0.0
      - AGENTMESH_PORT=8000
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
    profiles: ["full"]   # only runs when `docker compose --profile full up`

volumes:
  redis_data:
